<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{
margin:0;
background:#000;
}
model-viewer{
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<model-viewer
src="sushi.glb"
ios-src="sushi.usdz"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
auto-rotate
ar-scale="fixed"
>

<button slot="ar-button"
style="font-size:20px;padding:15px;">
ARで表示
</button>

</model-viewer>

</body>
</html>
