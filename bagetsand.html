<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
  /* 1. model-viewer 自体の配置を基準にする */
  model-viewer {
    width: 100vw;
    height: 100vh;
    display: block;
    position: relative; /* 子要素（ボタン）の基準点になります */
  }

  /* 2. ボタンのスタイルを強制適用する */
  #custom-ar-button {
    /* 配置の指定 */
    position: absolute !important; 
    top: 20px !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    
    /* 見た目の調整 */
    font-size: 40px;    /* 60pxだとスマホで巨大すぎる可能性があるため調整 */
    padding: 10px 20px;
    background-color: white;
    border: 2px solid #ccc;
    border-radius: 8px;
    white-space: nowrap; /* 改行を防ぐ */
    z-index: 100;       /* 重なり順を一番上に */
  }
</style>
</head>

<body style="margin:0;">

<model-viewer
src="bagetsand.glb"
ios-src="bagetsand.usdz"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
auto-rotate
style="width:100vw;height:100vh;">

<button slot="ar-button" id="custom-ar-button">
    グルメゴーストを召喚
</button>

</model-viewer>

</body>
</html>
